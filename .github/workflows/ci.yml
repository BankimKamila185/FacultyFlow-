name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci || npm install
      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate
      - name: Build
        working-directory: ./backend
        run: npm run build
      - name: Run Tests
        working-directory: ./backend
        run: npm test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci || npm install
      - name: Build
        working-directory: ./frontend
        run: npm run build
